<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: #0a0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .login-box {
    max-width: 400px;
    width: 100%;
    padding: 40px 35px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(12px);
  }

  .login-box h2 {
    text-align: center;
    color: #e0f2f1;
    font-size: 1.6rem;
    margin-bottom: 30px;
  }

  .login-box h2 span { color: #4dd0e1; }

  .login-box label {
    display: block;
    color: #80cbc4;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .login-box input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(77, 208, 225, 0.2);
    border-radius: 10px;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
  }

  .login-box input:focus {
    border-color: #4dd0e1;
    box-shadow: 0 0 15px rgba(77, 208, 225, 0.15);
  }

  .login-box button {
    width: 100%;
    padding: 14px;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: #0a0f1a;
    background: linear-gradient(135deg, #4dd0e1, #00897b);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }

  .login-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(77, 208, 225, 0.35);
  }

  #result {
    text-align: center;
    color: #4dd0e1;
    margin-top: 15px;
    font-weight: 500;
  }

  footer {
    background: linear-gradient(135deg, #004d40, #00796b);
    color: white;
    text-align: center;
    padding: 18px;
    font-size: 0.95rem;
    position: fixed;
    bottom: 0;
    width: 100%;
  }
</style>
</head>
<body>

<div class="login-box">
  <h2>Solar <span>Login</span></h2>
  <form id="loginForm">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" required>

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" required>

    <button type="submit">Login</button>
  </form>
  <p id="result"></p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var user = document.getElementById('username').value;
  var pass = document.getElementById('password').value;
  if (user && pass) {
    document.getElementById('result').innerText = 'Login successful! Welcome, ' + user;
  }
});
</script>
</body>
</html>
